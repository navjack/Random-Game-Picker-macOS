name: Build macOS App

on:
  push:
    branches: [Main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to upload asset to (e.g. v1.26)"
        required: false
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        run: |
          xcodebuild \
            -scheme "Random Game Picker" \
            -configuration Release \
            -derivedDataPath "${RUNNER_TEMP}/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package app
        run: |
          APP_PATH="${RUNNER_TEMP}/DerivedData/Build/Products/Release/Random Game Picker.app"
          ZIP_PATH="${RUNNER_TEMP}/Random-Game-Picker-macOS.zip"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "ZIP_PATH=$ZIP_PATH" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Random-Game-Picker-macOS
          path: ${{ env.ZIP_PATH }}

      - name: Upload release asset
        if: github.event_name == 'release' || github.event.inputs.tag_name != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RELEASE_TAG="${{ github.event.release.tag_name }}"
          else
            RELEASE_TAG="${{ github.event.inputs.tag_name }}"
          fi
          gh release upload "$RELEASE_TAG" "$ZIP_PATH" --clobber
